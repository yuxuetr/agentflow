[package]
name = "agentflow-server"
version = "0.1.0"
description = "Axum-based Gateway server for AgentFlow"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
# Q3.3.3: prost message structs in `src/scheduler/grpc.rs::pb` are
# generated from `proto/agentflow/scheduler/v1/worker.proto` via
# `build.rs`. Re-running `cargo build` after editing the .proto
# regenerates the Rust path so non-Rust bindings (generated from the
# same file) stay byte-compatible.
build = "build.rs"

[build-dependencies]
# Q3.3.3: drives `proto/agentflow/scheduler/v1/worker.proto` →
# `OUT_DIR/agentflow.scheduler.v1.rs`. We only ask for message
# structs (`build_client(false).build_server(false)`); the tower
# `Service` impl + `WorkerControl` trait stay hand-written in
# `src/scheduler/grpc.rs` because they wire in custom traceparent
# scope + admission credential extraction that the generated stubs
# don't model.
tonic-build = { version = "0.12", default-features = false, features = ["prost"] }

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace", "fs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy = "0.15"
async-trait = "0.1"
futures = "0.3"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tokio-stream = { version = "0.1", features = ["sync"] }
dirs = "5.0"
prost = "0.13"
tonic = "0.12"
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono", "uuid"] }
# P10.16.1: signed-JWT worker admission. HS256 (single shared secret) + RS256
# (asymmetric — operator-signed, worker-verifying — for the production IdP path).
jsonwebtoken = "9.3"
# P10.14.2-FU1: Prometheus `/metrics` endpoint emission. `metrics` is the
# facade (fire-and-forget `counter!()` / `histogram!()` macros from any
# production code path); `metrics-exporter-prometheus` provides the
# recorder that aggregates them into the Prometheus text format the
# Grafana dashboards (`dashboards/grafana/agentflow-overview.json`)
# expect to scrape.
metrics = "0.23"
metrics-exporter-prometheus = { version = "0.15", default-features = false }

# Workspace dependencies
agentflow-db = { path = "../agentflow-db", version = "0.1" }
agentflow-core = { path = "../agentflow-core", version = "0.2" }
# Workflow assembly (config schema + YAML -> Flow) + diagnostics report builder,
# shared with the CLI. Mirrors the CLI's default capability features so
# server-assembled workflows support the same node types. P-A2.4 moved the last
# server->cli usage (the doctor `build_report`) here, so the server no longer
# depends on the CLI binary crate at all.
agentflow-config = { path = "../agentflow-config", version = "0.1", features = ["plugin", "rag"] }
agentflow-skills = { path = "../agentflow-skills", version = "0.1" }
agentflow-tracing = { path = "../agentflow-tracing", version = "0.1" }
agentflow-tools = { path = "../agentflow-tools", version = "0.1" }
agentflow-harness = { path = "../agentflow-harness", version = "0.1" }
agentflow-agents = { path = "../agentflow-agents", version = "0.2" }
agentflow-llm = { path = "../agentflow-llm", version = "0.2" }
agentflow-memory = { path = "../agentflow-memory", version = "0.1" }

[dev-dependencies]
tower = { version = "0.4", features = ["util"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres"] }
futures = "0.3"
tempfile = "3"
urlencoding = "2"
# Q2.3.4 sweep_trace_dir test needs to backdate file mtime.
filetime = "0.2"
