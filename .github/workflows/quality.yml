name: Quality

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  verify-edition:
    name: verify workspace edition pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo xtask verify-edition
        run: cargo xtask verify-edition

  check-agent-sdk-doc:
    name: check agent SDK doc references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run cargo xtask check-agent-sdk-doc
        run: cargo xtask check-agent-sdk-doc

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # Q3.3.3: agentflow-server's build.rs invokes tonic-build, which
      # shells out to protoc to compile worker.proto. ubuntu-latest
      # does not preinstall protoc, so install it before clippy
      # compiles the workspace.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Check lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  redaction-lint:
    # Q5.2: workspace redaction audit. Scans every
    # `agentflow-*/src/**/*.rs` file for `(debug|info|warn|error)!(...)`
    # macro calls that interpolate raw user prompt / response / content /
    # body / params without going through
    # `agentflow_tracing::redaction::redact_text` (for plain strings) or
    # `agentflow_llm::prompt_fingerprint` (for opaque correlation IDs).
    # `trace!` is intentionally exempt because production deployments
    # exclude it. Suppress a known-false-positive with
    # `// allow-redaction-lint: <reason>` on the same line.
    name: cargo xtask redaction-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run redaction-lint
        run: cargo xtask redaction-lint

  clippy-lib-deny:
    # Q5.1: enforce no `unwrap()` / `expect()` in production library
    # code workspace-wide. Tests / examples / benches / build scripts
    # are intentionally exempt — the `--lib --no-deps` scope skips
    # them. Sites with a documented build-time invariant carry a
    # per-site `#[allow(clippy::expect_used, reason = "...")]`
    # annotation; the lint stays at deny so a regression flips CI red.
    name: cargo clippy --lib (unwrap/expect deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Enforce unwrap/expect deny on production code
        run: |
          cargo clippy --workspace --lib --no-deps -- \
            -A warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used

  proto-validate:
    # Q3.3.3: the `agentflow-server` build script generates prost
    # message structs from `agentflow-server/proto/agentflow/scheduler/v1/worker.proto`.
    # This standalone job validates the .proto file syntax with
    # `protoc` so a malformed .proto fails CI with a precise error
    # ("`message X` redeclared at L42") instead of letting the
    # failure surface as an opaque `tonic-build` panic inside the
    # clippy / doctest / examples jobs that compile the workspace.
    name: protoc validate worker.proto
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate worker.proto syntax
        run: |
          protoc \
            --proto_path=agentflow-server/proto \
            agentflow-server/proto/agentflow/scheduler/v1/worker.proto \
            --descriptor_set_out=/dev/null
      - name: Reject hand-written prost drift
        # Belt-and-braces: the Rust path consumes the .proto via
        # `tonic-build` in `agentflow-server/build.rs`. If a future
        # PR replaces `tonic::include_proto!` with a hand-written
        # `pub mod pb { ... }` block again, fail loudly here so the
        # audit-found drift cannot silently reappear.
        run: |
          if ! grep -q 'tonic::include_proto!("agentflow.scheduler.v1")' \
               agentflow-server/src/scheduler/grpc.rs; then
            echo "::error::Q3.3.3: agentflow-server/src/scheduler/grpc.rs must use" \
                 "tonic::include_proto! so worker.proto stays the source of truth"
            exit 1
          fi

  linux-sandbox-check:
    # P7.4-FU1: the Linux seccomp backend in agentflow-tools/src/sandbox/linux.rs
    # is `#[cfg(target_os = "linux")]`-gated, so macOS dev builds skip it. This
    # dedicated check pins a quick cargo-check pass on the Linux target so a
    # PR that re-introduces a Linux-only compile error fails fast (~2 min)
    # instead of waiting for the release-time docker image build.
    name: cargo check linux sandbox backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - name: cargo check linux sandbox backend
        run: cargo check --target x86_64-unknown-linux-gnu -p agentflow-tools --all-targets

  test:
    name: cargo test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - agentflow-core
          - agentflow-tools
          - agentflow-mcp
          - agentflow-memory
          - agentflow-skills
          - agentflow-agents
          - agentflow-cli
          - agentflow-llm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Q3.3.3: agentflow-server's build.rs needs protoc to compile
      # worker.proto. Only `agentflow-cli` in this matrix transitively
      # pulls in agentflow-server (the cargo build step below), but we
      # install protoc unconditionally because the conditional `if:`
      # below would skip the setup for any future package that depends
      # on agentflow-server, leading to a surprising failure.
      - name: Install protoc
        if: matrix.package == 'agentflow-cli'
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build agentflow-server for CLI integration tests
        if: matrix.package == 'agentflow-cli'
        # `agentflow serve --check` shells out to the agentflow-server
        # binary. `cargo test -p agentflow-cli` doesn't pull it in, so we
        # build it up front; tests that need it would otherwise fail with
        # an empty-stdout panic instead of running the readiness probe.
        run: cargo build -p agentflow-server
      - name: Run package tests
        run: cargo test -p ${{ matrix.package }} --all-targets

  doctest:
    name: cargo test docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Q3.3.3: `cargo test --workspace --doc` compiles agentflow-server,
      # whose build.rs needs protoc.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run workspace doc tests
        run: cargo test --workspace --doc

  features:
    name: cargo check features (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Existing combinations.
          - name: core-observability
            command: cargo check -p agentflow-core --features observability
          - name: mcp-local-transports
            command: cargo check -p agentflow-mcp --features client,server,stdio
          - name: cli-mcp
            command: cargo check -p agentflow-cli --no-default-features --features mcp
          - name: cli-rag
            command: cargo check -p agentflow-cli --no-default-features --features rag
          - name: cli-plugin
            command: cargo check -p agentflow-cli --no-default-features --features plugin
          - name: core-plugin
            command: cargo check -p agentflow-core --features plugin --all-targets
          # P3.9 expansion (working combinations as of v0.3.0):
          - name: cli-no-default
            command: cargo check -p agentflow-cli --no-default-features
          - name: cli-mcp-rag-plugin
            command: cargo check -p agentflow-cli --no-default-features --features mcp,rag,plugin
          - name: cli-all-features
            command: cargo check -p agentflow-cli --all-features
          - name: tracing-postgres
            command: cargo check -p agentflow-tracing --features postgres
          - name: mcp-all-transports
            command: cargo check -p agentflow-mcp --features client,server,stdio,http
          - name: nodes-default
            command: cargo check -p agentflow-nodes
          # M.7 fixes — these previously failed and are now wired in:
          - name: llm-openai-only
            command: cargo check -p agentflow-llm --no-default-features --features openai
          - name: nodes-batch-conditional
            command: cargo check -p agentflow-nodes --features batch,conditional
          # P3.9 close-out — agentflow-rag feature surface. The crate ships
          # four independent feature flags (qdrant default, plus
          # local-embeddings / pdf / html). Each one pulls a different
          # heavy dep tree, so breakage tends to be flag-specific.
          - name: rag-no-default
            command: cargo check -p agentflow-rag --no-default-features
          - name: rag-pdf
            command: cargo check -p agentflow-rag --no-default-features --features pdf
          - name: rag-html
            command: cargo check -p agentflow-rag --no-default-features --features html
          # local-embeddings is intentionally NOT in the matrix: it
          # pulls `ort`, which downloads ONNX Runtime binaries at build
          # time. CI on a clean network would work but is fragile, and
          # the operator-facing flag is already exercised by the rag
          # eval CI job downstream. Track as a manual-validation flag.
          - name: rag-pdf-html
            command: cargo check -p agentflow-rag --no-default-features --features pdf,html
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check feature combination
        run: ${{ matrix.command }}

  rag-eval-smoke:
    name: rag eval schema + baseline regression
    runs-on: ubuntu-latest
    # P10.6.2: dense + hybrid baselines require live OpenAI
    # embeddings, so they self-skip when OPENAI_API_KEY isn't set
    # as a repo secret. Forks without the secret stay green; the
    # main repo's PRs get full retriever-regression coverage when
    # the secret is available on the runner. The `secrets` context
    # cannot be referenced from a step-level `if:` expression
    # (GitHub Actions rejects it as "Unrecognized named-value"), so
    # the secret is promoted to a job-level env var here and the
    # step `if:` then gates on `env.OPENAI_API_KEY` — job-level env
    # is materialized before any step `if:` evaluation.
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Q3.3.3 follow-up: `agentflow-cli --features rag` transitively
      # depends on `agentflow-server`, whose `build.rs` shells out to
      # protoc to compile `worker.proto`. ubuntu-latest does not
      # preinstall protoc, so install it before any `cargo` invocation
      # below tries to build the workspace.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run RAG eval CI fixture (BM25, schema gate)
        run: cargo test -p agentflow-cli --features rag --test rag_eval_cli_tests
      - name: Run RAG eval gate-logic unit tests
        run: cargo test -p agentflow-cli --features rag --bin agentflow commands::rag::eval
      - name: Run RAG eval against checked-in BM25 baseline
        run: |
          cargo run -p agentflow-cli --features rag --bin agentflow -- \
            rag eval \
              --dataset agentflow-rag/eval_datasets/ci_offline \
              --compare-baseline agentflow-rag/eval_baselines/ci_offline/bm25.json
      - name: Run RAG eval against checked-in dense baseline
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          cargo run -p agentflow-cli --features rag --bin agentflow -- \
            rag eval \
              --dataset agentflow-rag/eval_datasets/ci_offline \
              --retriever dense \
              --embedding-model text-embedding-3-small \
              --compare-baseline agentflow-rag/eval_baselines/ci_offline/dense.json
      - name: Run RAG eval against checked-in hybrid baseline
        if: ${{ env.OPENAI_API_KEY != '' }}
        run: |
          cargo run -p agentflow-cli --features rag --bin agentflow -- \
            rag eval \
              --dataset agentflow-rag/eval_datasets/ci_offline \
              --retriever hybrid \
              --embedding-model text-embedding-3-small \
              --compare-baseline agentflow-rag/eval_baselines/ci_offline/hybrid.json

  examples:
    name: examples compile and smoke
    runs-on: ubuntu-latest
    # 10 min ceiling so a regression in any one example can't drag the
    # whole CI run. The xtask runner enforces a per-example cap on top
    # (P3.10 spec target is 5 min total wall clock for the smoke job).
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Q3.3.3: workspace examples + smoke tests transitively compile
      # agentflow-server, whose build.rs needs protoc.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "27.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Compile workspace examples
        run: cargo test --workspace --examples
      - name: Run examples-smoke (xtask)
        run: cargo xtask examples-smoke
      - name: Run no-API example smoke tests
        run: |
          cargo run -p agentflow-core --example fixed_dag_workflow
          cargo run -p agentflow-agents --example agent_native_react
          cargo run -p agentflow-agents --example plan_execute_agent
          cargo run -p agentflow-cli -- workflow run agentflow-cli/examples/workflows/fixed_dag_basic.yml --dry-run
          cargo run -p agentflow-cli -- workflow run agentflow-cli/examples/workflows/skill_agent_hybrid.yml --dry-run
          cargo run -p agentflow-cli --features rag -- workflow run agentflow-cli/examples/workflows/rag_skill_assistant.yml --dry-run
          cargo run -p agentflow-cli -- skill index validate agentflow-skills/examples/skills.index.toml
          cargo run -p agentflow-cli -- skill index list agentflow-skills/examples/skills.index.toml
          cargo run -p agentflow-cli -- skill index resolve agentflow-skills/examples/skills.index.toml mcp-demo
          cargo run -p agentflow-cli -- skill validate agentflow-skills/examples/skills/mcp-basic
          cargo run -p agentflow-cli -- skill list-tools agentflow-skills/examples/skills/mcp-basic
          cargo run -p agentflow-skills --example skill_calls_mcp_tool
          cargo run -p agentflow-agents --example hybrid_workflow_agent
          cargo build -p agentflow-core --features plugin --bin agentflow-echo-plugin
          cargo run -p agentflow-core --features plugin --example plugin_host_demo
          cargo test -p agentflow-cli --features plugin --test workflow_tests plugin_node_tests
          cargo test -p agentflow-cli --features plugin --test marketplace_cli_tests marketplace_install_plugin_package_from_verified_cache

  release-gate:
    name: release gate
    runs-on: ubuntu-latest
    needs:
      - fmt
      - verify-edition
      - check-agent-sdk-doc
      - clippy
      - clippy-lib-deny
      - redaction-lint
      - linux-sandbox-check
      - proto-validate
      - test
      - doctest
      - features
      - examples
      - rag-eval-smoke
    if: ${{ always() }}
    steps:
      - name: Summarize required gates
        run: |
          echo "fmt: ${{ needs.fmt.result }}"
          echo "verify-edition: ${{ needs.verify-edition.result }}"
          echo "check-agent-sdk-doc: ${{ needs.check-agent-sdk-doc.result }}"
          echo "clippy: ${{ needs.clippy.result }}"
          echo "clippy-lib-deny: ${{ needs.clippy-lib-deny.result }}"
          echo "redaction-lint: ${{ needs.redaction-lint.result }}"
          echo "linux-sandbox-check: ${{ needs.linux-sandbox-check.result }}"
          echo "proto-validate: ${{ needs.proto-validate.result }}"
          echo "test: ${{ needs.test.result }}"
          echo "doctest: ${{ needs.doctest.result }}"
          echo "features: ${{ needs.features.result }}"
          echo "examples: ${{ needs.examples.result }}"
          echo "rag-eval-smoke: ${{ needs.rag-eval-smoke.result }}"
          test "${{ needs.fmt.result }}" = "success"
          test "${{ needs.verify-edition.result }}" = "success"
          test "${{ needs.check-agent-sdk-doc.result }}" = "success"
          test "${{ needs.clippy.result }}" = "success"
          test "${{ needs.clippy-lib-deny.result }}" = "success"
          test "${{ needs.redaction-lint.result }}" = "success"
          test "${{ needs.linux-sandbox-check.result }}" = "success"
          test "${{ needs.proto-validate.result }}" = "success"
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.doctest.result }}" = "success"
          test "${{ needs.features.result }}" = "success"
          test "${{ needs.examples.result }}" = "success"
          test "${{ needs.rag-eval-smoke.result }}" = "success"
