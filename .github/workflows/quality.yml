name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Check lints
        run: cargo clippy --workspace --all-targets

  test:
    name: cargo test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - agentflow-core
          - agentflow-tools
          - agentflow-mcp
          - agentflow-memory
          - agentflow-skills
          - agentflow-agents
          - agentflow-cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run package tests
        run: cargo test -p ${{ matrix.package }} --all-targets
