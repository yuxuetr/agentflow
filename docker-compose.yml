services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentflow
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: agentflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentflow -d agentflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  agentflow-server:
    build:
      context: .
      args:
        PACKAGE: agentflow-server
        BIN: agentflow-server
    environment:
      DATABASE_URL: postgres://agentflow:agentflow@postgres:5432/agentflow
      PORT: "3000"
      RUST_LOG: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  postgres-data:
