services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentflow
      POSTGRES_USER: agentflow
      POSTGRES_PASSWORD: agentflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentflow -d agentflow"]
      interval: 5s
      timeout: 3s
      retries: 20

  agentflow-server:
    build:
      context: .
      args:
        PACKAGE: agentflow-server
        BIN: agentflow-server
    environment:
      DATABASE_URL: postgres://agentflow:agentflow@postgres:5432/agentflow
      PORT: "3000"
      RUST_LOG: info
      # Bearer auth for /v1/* routes. Leave unset for local dev (the server
      # will log a warning); set in production.
      # AGENTFLOW_API_TOKEN: "<replace-me>"
      # Path to a skills.index.toml on the container's filesystem. Mount
      # the host directory under /skills if you want skill listing /
      # invocation. Leaving this unset just means GET /v1/skills returns [].
      # AGENTFLOW_SKILLS_INDEX: "/skills/skills.index.toml"
    # volumes:
    #   - ./skills:/skills:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/health/live"]
      interval: 10s
      timeout: 3s
      retries: 12

volumes:
  postgres-data:
