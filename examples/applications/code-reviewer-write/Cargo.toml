[workspace]

[package]
name = "code-reviewer-write"
version = "0.1.0"
edition = "2024"
publish = false
description = "A2 follow-up: validates Harness Mode approval gate end-to-end by wiring wrap_registry + CliApprovalProvider manually (the `agentflow harness run` CLI doesn't currently do this — see findings)"

[dependencies]
agentflow-core    = { path = "../../../agentflow-core" }
agentflow-agents  = { path = "../../../agentflow-agents" }
agentflow-llm     = { path = "../../../agentflow-llm" }
agentflow-memory  = { path = "../../../agentflow-memory" }
agentflow-tools   = { path = "../../../agentflow-tools" }
agentflow-harness = { path = "../../../agentflow-harness" }

tokio              = { version = "1", features = ["full"] }
async-trait        = "0.1"
anyhow             = "1"
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dotenvy            = "0.15"

[[bin]]
name = "code-reviewer-write"
path = "src/main.rs"
