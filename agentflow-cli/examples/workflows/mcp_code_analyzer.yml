# MCP Code Analyzer Example
# This workflow demonstrates an advanced MCP integration that:
# 1. Uses MCP to read source code files
# 2. Uses LLM to analyze code quality
# 3. Uses template to format the report
#
# Prerequisites:
# - Install MCP filesystem server: npm install -g @modelcontextprotocol/server-filesystem
# - Set OPENAI_API_KEY environment variable
# - Run with: agentflow workflow run examples/workflows/mcp_code_analyzer.yml
#
# Example: Analyze a Rust file in /tmp

name: "MCP Code Analyzer"
description: "Hybrid workflow combining MCP + LLM + Templates for code analysis"
version: "1.0"

nodes:
  # Step 1: Use MCP to list Rust files in a directory
  - id: list_rust_files
    type: mcp
    parameters:
      server_command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
      tool_name: list_directory
      tool_params:
        path: "/tmp"
      timeout_ms: 30000
      max_retries: 3

  # Step 2: Use MCP to read a specific Rust file
  - id: read_source_code
    type: mcp
    dependencies: ["list_rust_files"]
    parameters:
      server_command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
      tool_name: read_file
      tool_params:
        path: "/tmp/example.rs"
      timeout_ms: 30000
      max_retries: 3

  # Step 3: Use LLM to analyze code quality
  - id: analyze_code_quality
    type: llm
    dependencies: ["read_source_code"]
    input_mapping:
      code_content: "{{ nodes.read_source_code.outputs.output }}"
    parameters:
      model: "gpt-4"
      system: |
        You are an expert Rust code reviewer. Analyze the code for:
        - Code quality and best practices
        - Potential bugs or issues
        - Performance optimizations
        - Security concerns
        - Documentation quality

        Provide a structured analysis with specific line references and suggestions.
      prompt: |
        Analyze the following Rust code:

        ```rust
        {{ code_content }}
        ```

        Provide a detailed code review covering quality, bugs, performance, security, and documentation.
      temperature: 0.3
      max_tokens: 2000

  # Step 4: Use LLM to suggest improvements
  - id: suggest_improvements
    type: llm
    dependencies: ["analyze_code_quality"]
    input_mapping:
      code_content: "{{ nodes.read_source_code.outputs.output }}"
      analysis: "{{ nodes.analyze_code_quality.outputs.response }}"
    parameters:
      model: "gpt-4"
      system: "You are a Rust expert. Based on the code analysis, provide specific code improvements with examples."
      prompt: |
        Based on this analysis:
        {{ analysis }}

        For the following code:
        ```rust
        {{ code_content }}
        ```

        Provide 3-5 specific code improvements with before/after examples.
      temperature: 0.5
      max_tokens: 1500

  # Step 5: Use template to format the final report
  - id: format_report
    type: template
    dependencies: ["suggest_improvements"]
    input_mapping:
      file_path: "/tmp/example.rs"
      analysis: "{{ nodes.analyze_code_quality.outputs.response }}"
      improvements: "{{ nodes.suggest_improvements.outputs.response }}"
    parameters:
      template: |
        # Code Analysis Report

        **File**: {{ file_path }}
        **Date**: {{ now() }}

        ---

        ## Analysis

        {{ analysis }}

        ---

        ## Suggested Improvements

        {{ improvements }}

        ---

        *Generated by AgentFlow MCP Code Analyzer*
      output_key: "report"
      output_format: "markdown"

  # Step 6: Save report using MCP (if write_file tool is available)
  # This is optional - the MCP server needs write permission
  - id: save_report
    type: mcp
    dependencies: ["format_report"]
    input_mapping:
      report_content: "{{ nodes.format_report.outputs.report }}"
    parameters:
      server_command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
      tool_name: write_file
      tool_params:
        path: "/tmp/code_analysis_report.md"
        content: "{{ report_content }}"
      timeout_ms: 30000
      max_retries: 3
    run_if: "{{ nodes.format_report.outputs.report | length > 0 }}"
