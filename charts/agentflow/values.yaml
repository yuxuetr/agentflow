replicaCount: 1

image:
  repository: agentflow
  tag: latest
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

containerPort: 3000

env:
  RUST_LOG: info
  PORT: "3000"

secretEnv:
  DATABASE_URL: ""

existingSecret: ""

resources: {}

livenessProbe:
  path: /health/live
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  path: /health/ready
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
